version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: review_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_review
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: review_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: review_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_review
      - REDIS_URL=redis://redis:6379/0
      # Provide keys below or inject via .env
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REVIEW_DRAFT_PR=${REVIEW_DRAFT_PR:-false}
      - MAX_DIFF_CHARS=${MAX_DIFF_CHARS:-50000}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  celery_worker:
    build: ./backend
    container_name: review_celery_worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_review
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REVIEW_DRAFT_PR=${REVIEW_DRAFT_PR:-false}
      - MAX_DIFF_CHARS=${MAX_DIFF_CHARS:-50000}
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: review_frontend
    restart: always
    environment:
      - VITE_API_URL=
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: review_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
